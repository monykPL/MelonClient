<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziękujemy za pobranie! - Melon Client</title>
    <style>
        :root {
            --bg-color: #111213;
            --accent-color: #1bd96a;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: rgba(17, 18, 19, 0.85);
            border-bottom: 1px solid #2d3034;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 32px;
            width: auto;
            object-fit: contain;
        }

        .logo span {
            color: var(--accent-color);
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            margin-left: 1.5rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--text-main);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .thank-you-box {
            text-align: center;
            max-width: 700px;
        }

        .thank-you-box h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .thank-you-box p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* Stopka */
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="../" class="logo">
                <img src="../logo-small.png" alt="Melon Client Logo">
                Melon<span>Client</span>
            </a>
            <nav>
                <a href="../#features">Funkcje</a>
                <a href="https://github.com/monykPL/MelonClient/" target="_blank">GitHub</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="thank-you-box">
            <h1>Dziękuje za pobranie mojego clienta</h1>
            <p>Pobierając ten client wspierasz monykPL. Życzę Miłej Gry!</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Melon Client. Strona zainspirowana stylem Modrinth.</p>
    </footer>

</body>
</html>
